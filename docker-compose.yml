services:
  db:
    image: postgres:17
    container_name: chat-with-your-data-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d chinook"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: